<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hakediş Defteri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper:#E8E4DA;
    --paper-line:#CFC9BC;
    --card:#FBFAF6;
    --card-2:#F3F0E8;
    --ink:#1E2B3C;
    --ink-soft:#4B5A6B;
    --steel:#6B6F76;
    --accent:#D9622B;
    --success:#4F7A5C;
    --danger:#B4432E;

    --c-beton:#8B8A85;
    --c-demir:#A45C3B;
    --c-duvar:#B5533A;
    --c-siva:#C9AE7C;
    --c-alcipan:#7E9A82;
    --c-ozet:#1E2B3C;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);font-family:'Inter',sans-serif;color:var(--ink);}
  .wrap{max-width:1040px;margin:0 auto;padding:24px 20px 60px;}

  header.app{margin-bottom:18px;}
  header.app h1{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:26px;
    letter-spacing:0.3px;margin:0 0 2px;
  }
  header.app p.sub{margin:0;color:var(--ink-soft);font-size:13px;}

  .controls{
    display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin:18px 0 14px;
  }
  .field label{display:block;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .field select, .field input{
    width:100%;padding:9px 10px;border:1px solid var(--paper-line);border-radius:4px;
    background:var(--card);font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);
  }
  .field select:focus, .field input:focus{outline:2px solid var(--accent);outline-offset:-1px;}

  .save-status{font-size:12px;color:var(--ink-soft);text-align:right;margin-bottom:10px;height:16px;}

  .fb-warning{
    background:#F6E4D8;border:1px solid var(--accent);color:#7A3C15;border-radius:6px;
    padding:10px 14px;font-size:13px;margin-bottom:14px;line-height:1.5;
  }
  .fb-warning code{background:#00000010;padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;}

  .metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
  .metric-card{background:var(--card);border:1px solid var(--paper-line);border-radius:6px;padding:12px 14px;}
  .metric-card .label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
  .metric-card .value{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;color:var(--ink);}

  .tabs{display:flex;gap:3px;border-bottom:2px solid var(--ink);flex-wrap:wrap;}
  .tab{
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:13px;
    padding:9px 16px 8px;background:#DCD8CC;color:var(--ink-soft);border:none;
    border-top-left-radius:4px;border-top-right-radius:4px;cursor:pointer;
    border-bottom:3px solid transparent;transition:background .12s;
  }
  .tab:hover{background:#E4E0D4;}
  .tab.active{background:var(--card);color:var(--ink);}

  .panel{background:var(--card);border:1px solid var(--paper-line);border-top:none;padding:20px;border-radius:0 0 6px 6px;}

  .module-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;}
  .module-head h2{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;margin:0;}

  .target-row{display:flex;gap:10px;align-items:flex-end;margin:14px 0 10px;flex-wrap:wrap;}
  .target-field label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  .target-field input{
    padding:7px 8px;border:1px solid var(--paper-line);border-radius:4px;background:#fff;font-size:13px;width:120px;
  }
  .target-unit{font-size:13px;color:var(--ink-soft);padding-bottom:8px;}

  .progress-wrap{margin:10px 0 18px;}
  .progress-track{background:var(--paper);border-radius:6px;height:10px;overflow:hidden;border:1px solid var(--paper-line);}
  .progress-fill{height:100%;border-radius:6px;}
  .progress-label{font-size:12px;color:var(--ink-soft);margin-top:4px;font-family:'IBM Plex Mono',monospace;}

  .row-summary{display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px;padding:8px 12px;background:var(--card-2);border-radius:4px;border:1px solid var(--paper-line);}
  .row-summary .rs-item{font-size:12.5px;color:var(--ink-soft);}
  .row-summary .rs-item b{font-family:'IBM Plex Mono',monospace;color:var(--ink);font-weight:500;}

  .row-card{border:1px solid var(--paper-line);border-radius:6px;margin-bottom:10px;overflow:hidden;}
  .row-head{display:flex;gap:8px;align-items:center;padding:8px 10px;background:var(--card-2);border-bottom:1px solid var(--paper-line);}
  .row-head input.mekan{
    flex:1;border:1px solid transparent;background:transparent;font-size:13.5px;font-weight:500;
    padding:5px 6px;border-radius:3px;color:var(--ink);font-family:'Inter',sans-serif;
  }
  .row-head input.mekan:hover{border-color:var(--paper-line);}
  .row-head input.mekan:focus{border-color:var(--accent);outline:none;background:#fff;}
  .row-head select.calctype{
    font-size:12px;padding:5px 6px;border:1px solid var(--paper-line);border-radius:3px;background:#fff;color:var(--ink-soft);
  }
  .row-head .btn-sil{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;line-height:1;padding:4px;}

  .row-fields{display:grid;grid-template-columns:repeat(auto-fill, minmax(120px,1fr));gap:8px;padding:10px;}
  .field-item label{display:block;font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px;}
  .field-item input, .field-item select{
    width:100%;padding:6px 7px;border:1px solid var(--paper-line);border-radius:4px;background:#fff;
    font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--ink);
  }
  .field-item select{font-family:'Inter',sans-serif;}
  .field-item input:focus, .field-item select:focus{border-color:var(--accent);outline:none;}

  .extra-fields{display:flex;gap:8px;padding:10px 10px 0;flex-wrap:wrap;}
  .extra-fields .field-item{max-width:180px;}

  .subgroup{padding:0 10px;margin-bottom:6px;}
  .subgroup-head{display:flex;justify-content:space-between;align-items:center;margin:10px 0 6px;}
  .subgroup-head span{font-size:10.5px;text-transform:uppercase;letter-spacing:0.3px;color:var(--ink-soft);font-weight:500;}
  .add-item{
    background:none;border:1px dashed var(--paper-line);color:var(--ink-soft);
    padding:4px 10px;font-size:11.5px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;
  }
  .add-item:hover{border-color:var(--accent);color:var(--accent);}

  .alan-item{display:flex;gap:6px;align-items:center;padding:6px 8px;background:#fff;border:1px solid var(--paper-line);border-radius:4px;margin-bottom:6px;flex-wrap:wrap;}
  .alan-item select.ai-mode, .alan-item select.ai-mode-single{
    font-size:11.5px;padding:5px 6px;border:1px solid var(--paper-line);border-radius:4px;color:var(--ink-soft);font-family:'Inter',sans-serif;
  }
  .alan-item input{width:110px;padding:5px 7px;border:1px solid var(--paper-line);border-radius:4px;font-size:12.5px;font-family:'IBM Plex Mono',monospace;}
  .alan-item .ai-val{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--ink-soft);background:var(--card-2);padding:3px 8px;border-radius:4px;}
  .alan-item .ai-sil{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 4px;}

  .row-foot{display:flex;gap:10px;align-items:center;padding:8px 10px;border-top:1px solid var(--paper-line);flex-wrap:wrap;}
  .btn-hesapla{
    background:var(--ink);color:#fff;border:none;padding:6px 12px;border-radius:4px;
    font-size:12.5px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;
  }
  .btn-hesapla:hover{background:var(--accent);}
  .miktar-badge{
    font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;background:var(--paper);
    padding:5px 10px;border-radius:4px;border:1px solid var(--paper-line);color:var(--ink);
  }
  .row-foot .ff{display:flex;flex-direction:column;gap:2px;}
  .row-foot .ff label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;}
  .row-foot .ff input{
    border:1px solid var(--paper-line);border-radius:4px;padding:5px 7px;font-size:13px;width:100px;
    font-family:'IBM Plex Mono',monospace;
  }
  .row-foot .tutar-val{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft);}
  .row-foot input.not-input{
    flex:1;min-width:100px;border:1px solid var(--paper-line);border-radius:4px;padding:6px 8px;font-size:13px;
    font-family:'Inter',sans-serif;
  }

  .addrow{
    background:none;border:1px dashed var(--paper-line);color:var(--ink-soft);
    padding:8px 14px;font-size:13px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;
  }
  .addrow:hover{border-color:var(--accent);color:var(--accent);}

  .empty-note{color:var(--ink-soft);font-size:13px;margin:6px 0 16px;}

  .ozet-card{
    border:1px solid var(--paper-line);border-left:4px solid var(--ink);border-radius:4px;
    padding:12px 14px;margin-bottom:10px;
  }
  .ozet-card h3{font-family:'Space Grotesk',sans-serif;font-size:14px;margin:0 0 8px;display:flex;align-items:center;gap:8px;}
  .ozet-line{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;}
  .ozet-line span.qty{font-family:'IBM Plex Mono',monospace;}
  .ozet-empty{color:var(--ink-soft);font-size:13px;}

  .kayit-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;}
  .kayit-table th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.3px;color:var(--ink-soft);padding:8px 8px;border-bottom:2px solid var(--ink);}
  .kayit-table td{padding:7px 8px;border-bottom:1px solid var(--paper-line);}
  .kayit-table td.num{font-family:'IBM Plex Mono',monospace;text-align:right;}
  .kayit-table tbody tr:hover{background:var(--card-2);}

  .backup-box{
    margin-top:14px;border:1px solid var(--paper-line);border-radius:6px;padding:14px 16px;background:var(--card-2);
  }
  .backup-box h3{font-family:'Space Grotesk',sans-serif;font-size:13.5px;margin:0 0 6px;}
  .backup-box p{font-size:12.5px;color:var(--ink-soft);margin:0 0 10px;line-height:1.5;}
  .backup-actions{display:flex;gap:8px;flex-wrap:wrap;}

  .placeholder-note{
    background:#F2EFE6;border:1px solid var(--paper-line);border-radius:4px;
    padding:10px 12px;font-size:12.5px;color:var(--ink-soft);margin-top:16px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div id="fbWarning" class="fb-warning" style="display:none;">
    ⚠ Firebase yapılandırması eksik. Bu dosyanın en üstündeki <code>firebaseConfig</code> alanını kendi Firebase projenizin bilgileriyle doldurun — yoksa kayıtlar cihaz kapanınca / sayfa yenilenince kaybolur.
  </div>

  <header class="app">
    <h1>Hakediş defteri</h1>
    <p class="sub">Şantiye bazlı hakediş metraj, tutar ve ilerleme takibi</p>
  </header>

  <div class="controls">
    <div class="field">
      <label for="siteSelect">Şantiye</label>
      <select id="siteSelect"></select>
    </div>
    <div class="field">
      <label for="periodInput">Dönem</label>
      <input type="month" id="periodInput">
    </div>
    <div class="field">
      <label for="hakedisNo">Hakediş no</label>
      <input type="text" id="hakedisNo" placeholder="ör. 4">
    </div>
  </div>

  <div class="save-status" id="saveStatus"></div>

  <div class="metric-row" id="metricRow"></div>

  <div class="tabs" id="tabs"></div>
  <div class="panel" id="panel"></div>

</div>

<script>
const SITES = ["Işık","Sahil","Kurt Kiremit"];

function num(v){ const n = parseFloat(String(v==null?"":v).replace(",", ".")); return isNaN(n) ? 0 : n; }

function alanItemValue(item){
  if(!item) return 0;
  if(item.mode === "direkt") return num(item.m2);
  return num(item.genislik) * num(item.yukseklik);
}

function initVals(ct){
  if(ct.kind === "oda-grup"){
    const v = { duvarlar: [], bosluklar: [] };
    (ct.extraFields || []).forEach(f => { v[f.key] = ""; });
    return v;
  }
  if(ct.kind === "alan-toggle"){
    return { alan: { mode:"boyut", genislik:"", yukseklik:"", m2:"" } };
  }
  return {};
}

const MODULE_CONFIG = {
  beton: {
    label:"Beton", color:"var(--c-beton)", birim:"m²",
    calcTypes:[{
      key:"direkt", label:"Miktar", kind:"fields",
      fields:[
        {key:"eleman", label:"Döküldüğü yer", type:"select", options:["Püskürtme","Fore Kazık","Grobeton","Temel","Perde-Kolon (Birlikte)","Döşeme"]},
        {key:"sinif", label:"Beton sınıfı", type:"select", options:["C25","C30","C35","C40"]},
        {key:"metrekare", label:"Metrekare (m²)", type:"number"},
      ],
      compute:v => num(v.metrekare)
    }]
  },
  demir: {
    label:"Demir", color:"var(--c-demir)", birim:"kg",
    calcTypes:[{
      key:"agirlik", label:"Ağırlık", kind:"fields",
      fields:[
        {key:"cap", label:"Çap", type:"select", options:["Ø8","Ø10","Ø12","Ø14","Ø16","Ø18","Ø20","Ø22","Ø25","Ø28","Ø32"]},
        {key:"kg", label:"Kg", type:"number"},
      ],
      compute:v => num(v.kg)
    }]
  },
  duvar: {
    label:"Duvar", color:"var(--c-duvar)", birim:"m²",
    calcTypes:[{
      key:"oda", label:"Oda bazlı", kind:"oda-grup",
      groups:[
        {key:"duvarlar", label:"Duvarlar", addLabel:"+ duvar ekle"},
        {key:"bosluklar", label:"Boşluklar (kapı / pencere)", addLabel:"+ boşluk ekle"},
      ],
      compute:v => {
        const walls = (v.duvarlar||[]).reduce((s,it)=>s+alanItemValue(it),0);
        const openings = (v.bosluklar||[]).reduce((s,it)=>s+alanItemValue(it),0);
        return Math.max(0, walls - openings);
      }
    }]
  },
  siva: {
    label:"Sıva", color:"var(--c-siva)", birim:"m²",
    calcTypes:[{
      key:"oda", label:"Oda bazlı", kind:"oda-grup",
      extraFields:[{key:"tur", label:"Sıva türü", type:"select", options:["Kara sıva","Alçı sıva"]}],
      groups:[
        {key:"duvarlar", label:"Duvarlar", addLabel:"+ duvar ekle"},
        {key:"bosluklar", label:"Boşluklar (kapı / pencere)", addLabel:"+ boşluk ekle"},
      ],
      compute:v => {
        const walls = (v.duvarlar||[]).reduce((s,it)=>s+alanItemValue(it),0);
        const openings = (v.bosluklar||[]).reduce((s,it)=>s+alanItemValue(it),0);
        return Math.max(0, walls - openings);
      }
    }]
  },
  alcipan: {
    label:"Alçıpan", color:"var(--c-alcipan)", birim:"m²",
    calcTypes:[
      {
        key:"duz", label:"Düz yüzey", kind:"alan-toggle",
        compute:v => alanItemValue(v.alan)
      },
      {
        key:"dikey", label:"Dikey yüz (kademe)", kind:"fields",
        fields:[
          {key:"cevre", label:"İç kutu çevresi (m)", type:"number"},
        ],
        compute:v => num(v.cevre) * 0.60
      },
    ]
  },
};

const MODULE_KEYS = Object.keys(MODULE_CONFIG);

let state = {
  site: SITES[0],
  period: new Date().toISOString().slice(0,7),
  hakedisNo: "",
  activeTab: MODULE_KEYS[0],
  data: emptyData(),
};

function emptyData(){
  const d = {};
  MODULE_KEYS.forEach(k => d[k] = { target: "", rows: [] });
  return d;
}

function migrateModule(raw){
  if(!raw) return { target: "", rows: [] };
  if(Array.isArray(raw)){
    // very old flat rows -> keep mekan/not/birimFiyat, drop old miktar (needs re-entry via fields)
    return { target:"", rows: raw.map(r => ({
      id: r.id, mekan: r.mekan || "", calcType: null, vals: {},
      birimFiyat: r.birimFiyat || "", not: [r.aciklama, r.not].filter(Boolean).join(" — ")
    })) };
  }
  if(raw.rows){
    const target = (typeof raw.target === "object" && raw.target) ? (raw.target.miktar || "") : (raw.target || "");
    return { target, rows: raw.rows.map(r => ({
      id: r.id, mekan: r.mekan || "", calcType: r.calcType || null, vals: r.vals || {},
      birimFiyat: r.birimFiyat || "", not: r.not || ""
    })) };
  }
  return { target:"", rows: [] };
}

function slug(s){ return s.replace(/\s+/g, "_"); }
function dataKey(site, period){ return "hakedis:" + slug(site) + ":" + period; }
function fmtTRY(n){ return n.toLocaleString("tr-TR", {style:"currency", currency:"TRY", maximumFractionDigits:0}); }
function fmtNum(n, digits){ return n.toLocaleString("tr-TR", {maximumFractionDigits: digits===undefined?2:digits}); }
function uid(){ return "r" + Math.random().toString(36).slice(2,9); }

// ---- Firebase yapılandırması ----
// Aşağıdaki alanları kendi Firebase projenizden alacağınız bilgilerle değiştirin.
// (Firebase Console > Proje ayarları > Genel > "Uygulamalarınız" > Web uygulaması yapılandırması)
const firebaseConfig = {
  apiKey: "AIzaSyBDqa27MtJHf9P-shL6bKRA7Pv-vxavzMI",
  authDomain: "hahedis-defteri.firebaseapp.com",
  projectId: "hahedis-defteri",
  storageBucket: "hahedis-defteri.firebasestorage.app",
  messagingSenderId: "475219463949",
  appId: "1:475219463949:web:d15ea1f5e0b02d7c62ea44"
};

let db = null;
let firebaseReady = false;
try{
  if(firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("BURAYA_") === -1 && typeof firebase !== "undefined"){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }
}catch(e){
  firebaseReady = false;
}
if(!firebaseReady){
  document.addEventListener("DOMContentLoaded", () => {
    const w = document.getElementById("fbWarning");
    if(w) w.style.display = "block";
  });
}

async function fsGet(key){
  if(!firebaseReady) return null;
  const snap = await db.collection("hakedis").doc(key).get();
  return snap.exists ? snap.data() : null;
}
async function fsSet(key, valueObj){
  if(!firebaseReady) throw new Error("Firebase yapılandırılmadı");
  await db.collection("hakedis").doc(key).set(valueObj);
}
async function fsListAll(){
  if(!firebaseReady) return {};
  const snap = await db.collection("hakedis").get();
  const result = {};
  snap.forEach(d => { result[d.id] = d.data(); });
  return result;
}

let saveTimer = null;
function scheduleSave(){
  const el = document.getElementById("saveStatus");
  el.textContent = "kaydediliyor…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try{
      await fsSet(dataKey(state.site, state.period), {
        hakedisNo: state.hakedisNo,
        data: state.data,
      });
      el.textContent = "kaydedildi";
    }catch(e){
      el.textContent = firebaseReady ? "kaydedilemedi" : "Firebase ayarlanmadı — kayıt yok";
    }
  }, 500);
}

async function loadCurrent(){
  const el = document.getElementById("saveStatus");
  el.textContent = "yükleniyor…";
  try{
    const docData = await fsGet(dataKey(state.site, state.period));
    if(docData){
      const d = emptyData();
      MODULE_KEYS.forEach(k => { d[k] = migrateModule((docData.data || {})[k]); });
      state.data = d;
      state.hakedisNo = docData.hakedisNo || "";
    } else {
      state.data = emptyData();
      state.hakedisNo = "";
    }
  }catch(e){
    state.data = emptyData();
    state.hakedisNo = "";
  }
  document.getElementById("hakedisNo").value = state.hakedisNo;
  el.textContent = "";
  renderAll();
}

function renderTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  const all = [...MODULE_KEYS.map(k => ({key:k, ...MODULE_CONFIG[k]})), {key:"ozet", label:"Özet", color:"var(--c-ozet)"}, {key:"kayitlar", label:"Tüm Kayıtlar", color:"var(--accent)"}];
  all.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "tab" + (state.activeTab === m.key ? " active" : "");
    btn.textContent = m.label;
    btn.style.borderBottomColor = state.activeTab === m.key ? m.color : "transparent";
    btn.addEventListener("click", () => { state.activeTab = m.key; renderTabs(); renderPanel(); });
    tabs.appendChild(btn);
  });
}

function getCalcType(cfg, row){
  return cfg.calcTypes.find(c => c.key === row.calcType) || cfg.calcTypes[0];
}
function rowMiktar(cfg, row){
  const ct = getCalcType(cfg, row);
  return ct.compute(row.vals || {});
}

function moduleSummary(modKey){
  const cfg = MODULE_CONFIG[modKey];
  const mod = state.data[modKey];
  let totalMiktar = 0, totalTutar = 0;
  mod.rows.forEach(r => {
    const q = rowMiktar(cfg, r);
    const p = num(r.birimFiyat);
    totalMiktar += q;
    totalTutar += q * p;
  });
  const targetQ = num(mod.target);
  let progress = null;
  if(targetQ > 0){ progress = Math.min(100, (totalMiktar / targetQ) * 100); }
  return { totalMiktar, totalTutar, progress, targetQ: targetQ>0?targetQ:null, rowCount: mod.rows.length };
}

function renderMetrics(){
  const row = document.getElementById("metricRow");
  let grandTutar = 0, rowCount = 0, progressVals = [];
  MODULE_KEYS.forEach(k => {
    const s = moduleSummary(k);
    grandTutar += s.totalTutar;
    rowCount += s.rowCount;
    if(s.progress !== null) progressVals.push(s.progress);
  });
  const avgProgress = progressVals.length ? (progressVals.reduce((a,b)=>a+b,0) / progressVals.length) : null;
  row.innerHTML = `
    <div class="metric-card">
      <div class="label">Toplam hakediş tutarı</div>
      <div class="value">${fmtTRY(grandTutar)}</div>
    </div>
    <div class="metric-card">
      <div class="label">Toplam kalem sayısı</div>
      <div class="value">${rowCount}</div>
    </div>
    <div class="metric-card">
      <div class="label">Ortalama ilerleme</div>
      <div class="value">${avgProgress === null ? "—" : fmtNum(avgProgress,0) + "%"}</div>
    </div>
  `;
}

function escapeAttr(v){ return (v || "").toString().replace(/"/g, "&quot;"); }
function escapeHtml(v){ return (v || "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function getAllRecords(){
  const records = [];
  MODULE_KEYS.forEach(k => {
    const cfg = MODULE_CONFIG[k];
    state.data[k].rows.forEach(r => {
      const miktar = rowMiktar(cfg, r);
      const birimFiyat = num(r.birimFiyat);
      records.push({ modul: cfg.label, mekan: r.mekan, miktar, birim: cfg.birim, birimFiyat, tutar: miktar*birimFiyat, not: r.not });
    });
  });
  return records;
}

function toCsvValue(v){ return `"${String(v==null?"":v).replace(/"/g,'""')}"`; }

function downloadCSV(){
  const records = getAllRecords();
  const header = ["Şantiye","Dönem","Hakediş No","Modül","Mekan","Miktar","Birim","Birim Fiyat","Tutar","Not"];
  const lines = [header.map(toCsvValue).join(";")];
  records.forEach(r => {
    lines.push([
      state.site, state.period, state.hakedisNo,
      r.modul, r.mekan, fmtNum(r.miktar), r.birim, fmtNum(r.birimFiyat), fmtNum(r.tutar), r.not
    ].map(toCsvValue).join(";"));
  });
  const csv = "\uFEFF" + lines.join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `hakedis_${slug(state.site)}_${state.period}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderFieldInput(cfg, row, field){
  const val = row.vals[field.key] || "";
  if(field.type === "select"){
    return `<select data-field="${field.key}">
      <option value="">—</option>
      ${field.options.map(o => `<option value="${o}" ${o===val?"selected":""}>${o}</option>`).join("")}
    </select>`;
  }
  return `<input type="text" data-field="${field.key}" value="${escapeAttr(val)}" placeholder="0">`;
}

function renderAlanItemHtml(groupKey, item){
  const modeSel = `<select class="ai-mode" data-group="${groupKey}" data-item="${item.id}">
      <option value="boyut" ${item.mode!=="direkt"?"selected":""}>Uzunluk × Genişlik</option>
      <option value="direkt" ${item.mode==="direkt"?"selected":""}>Direkt m²</option>
    </select>`;
  const inputs = item.mode === "direkt"
    ? `<input type="text" data-group="${groupKey}" data-item="${item.id}" data-key="m2" value="${escapeAttr(item.m2)}" placeholder="m²">`
    : `<input type="text" data-group="${groupKey}" data-item="${item.id}" data-key="genislik" value="${escapeAttr(item.genislik)}" placeholder="Genişlik (m)">
       <input type="text" data-group="${groupKey}" data-item="${item.id}" data-key="yukseklik" value="${escapeAttr(item.yukseklik)}" placeholder="Yükseklik (m)">`;
  return `<div class="alan-item">
    ${modeSel}
    ${inputs}
    <span class="ai-val">${fmtNum(alanItemValue(item))} m²</span>
    <button class="ai-sil" data-group="${groupKey}" data-item="${item.id}" title="sil">✕</button>
  </div>`;
}

function renderAlanToggleHtml(row){
  if(!row.vals.alan) row.vals.alan = { mode:"boyut", genislik:"", yukseklik:"", m2:"" };
  const item = row.vals.alan;
  const modeSel = `<select class="ai-mode-single">
      <option value="boyut" ${item.mode!=="direkt"?"selected":""}>Uzunluk × Genişlik</option>
      <option value="direkt" ${item.mode==="direkt"?"selected":""}>Direkt m²</option>
    </select>`;
  const inputs = item.mode === "direkt"
    ? `<input type="text" class="ai-single" data-key="m2" value="${escapeAttr(item.m2)}" placeholder="m²">`
    : `<input type="text" class="ai-single" data-key="genislik" value="${escapeAttr(item.genislik)}" placeholder="Genişlik (m)">
       <input type="text" class="ai-single" data-key="yukseklik" value="${escapeAttr(item.yukseklik)}" placeholder="Yükseklik (m)">`;
  return `<div class="alan-item">${modeSel}${inputs}<span class="ai-val">${fmtNum(alanItemValue(item))} m²</span></div>`;
}

function renderCalcBody(cfg, ct, row){
  if(ct.kind === "alan-toggle"){
    return renderAlanToggleHtml(row);
  }
  if(ct.kind === "oda-grup"){
    let html = "";
    if(ct.extraFields){
      html += `<div class="extra-fields">${ct.extraFields.map(f => `<div class="field-item"><label>${f.label}</label>${renderFieldInput(cfg,row,f)}</div>`).join("")}</div>`;
    }
    ct.groups.forEach(g => {
      if(!row.vals[g.key]) row.vals[g.key] = [];
      const items = row.vals[g.key];
      html += `<div class="subgroup">
        <div class="subgroup-head"><span>${g.label}</span><button class="add-item" data-group="${g.key}">${g.addLabel}</button></div>
        ${items.map(it => renderAlanItemHtml(g.key, it)).join("") || '<p class="empty-note" style="margin:2px 0 8px;">Henüz eklenmedi.</p>'}
      </div>`;
    });
    return html;
  }
  return `<div class="row-fields">${ct.fields.map(f => `<div class="field-item"><label>${f.label}</label>${renderFieldInput(cfg,row,f)}</div>`).join("")}</div>`;
}

function renderRowCard(modKey, row){
  const cfg = MODULE_CONFIG[modKey];
  const ct = getCalcType(cfg, row);
  const miktar = rowMiktar(cfg, row);
  const tutar = miktar * num(row.birimFiyat);

  const typeSelector = cfg.calcTypes.length > 1 ? `
    <select class="calctype" data-id="${row.id}">
      ${cfg.calcTypes.map(c => `<option value="${c.key}" ${c.key===ct.key?"selected":""}>${c.label}</option>`).join("")}
    </select>` : "";

  return `
  <div class="row-card" data-id="${row.id}">
    <div class="row-head">
      <input type="text" class="mekan" value="${escapeAttr(row.mekan)}" placeholder="ör. Daire 3 salon">
      ${typeSelector}
      <button class="btn-sil" title="satırı sil">✕</button>
    </div>
    ${renderCalcBody(cfg, ct, row)}
    <div class="row-foot">
      <button class="btn-hesapla" data-id="${row.id}">Hesapla</button>
      <span class="miktar-badge">${fmtNum(miktar)} ${cfg.birim}</span>
      <div class="ff"><label>Birim fiyat</label><input type="text" class="fiyat" value="${escapeAttr(row.birimFiyat)}" placeholder="0"></div>
      <span class="tutar-val">${fmtTRY(tutar)}</span>
      <input type="text" class="not-input" value="${escapeAttr(row.not)}" placeholder="not">
    </div>
  </div>`;
}

function renderModulePanel(modKey){
  const cfg = MODULE_CONFIG[modKey];
  const mod = state.data[modKey];
  const panel = document.getElementById("panel");
  const s = moduleSummary(modKey);

  panel.innerHTML = `
    <div class="module-head">
      <span class="swatch" style="background:${cfg.color}"></span>
      <h2>${cfg.label}</h2>
    </div>

    <div class="target-row">
      <div class="target-field">
        <label>Sözleşme miktarı</label>
        <input type="text" id="targetMiktar" value="${escapeAttr(mod.target)}" placeholder="ör. 450">
      </div>
      <div class="target-unit">${cfg.birim}</div>
    </div>

    ${s.targetQ ? `
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${s.progress}%;background:${cfg.color}"></div></div>
      <div class="progress-label">${fmtNum(s.totalMiktar)} / ${fmtNum(s.targetQ)} ${cfg.birim} — %${fmtNum(s.progress,0)}</div>
    </div>` : `<p class="empty-note">İlerleme yüzdesi için sözleşme miktarı girin.</p>`}

    <div class="row-summary">
      <div class="rs-item">Toplam metraj: <b>${fmtNum(s.totalMiktar)} ${cfg.birim}</b></div>
      <div class="rs-item">Toplam tutar: <b>${fmtTRY(s.totalTutar)}</b></div>
      <div class="rs-item">Kalem: <b>${s.rowCount}</b></div>
    </div>

    <div id="rowsList">${mod.rows.map(r => renderRowCard(modKey, r)).join("")}</div>
    ${s.rowCount === 0 ? '<p class="empty-note">Henüz satır eklenmedi.</p>' : ''}
    <button class="addrow" id="addRowBtn">+ satır ekle</button>
    <div class="placeholder-note">
      ${cfg.label} metrajı yukarıdaki ölçülere göre otomatik hesaplanır. Gerekirse alanları birlikte sadeleştirebiliriz.
    </div>
  `;

  document.getElementById("targetMiktar").addEventListener("input", e => { mod.target = e.target.value; scheduleSave(); });

  document.getElementById("addRowBtn").addEventListener("click", () => {
    mod.rows.push({ id: uid(), mekan:"", calcType: cfg.calcTypes[0].key, vals: initVals(cfg.calcTypes[0]), birimFiyat:"", not:"" });
    renderModulePanel(modKey);
    renderMetrics();
    scheduleSave();
  });

  panel.querySelectorAll(".row-card").forEach(card => {
    const id = card.dataset.id;
    const row = mod.rows.find(r => r.id === id);

    card.querySelector(".mekan").addEventListener("input", e => { row.mekan = e.target.value; scheduleSave(); });
    card.querySelector(".fiyat").addEventListener("input", e => { row.birimFiyat = e.target.value; scheduleSave(); });
    card.querySelector(".not-input").addEventListener("input", e => { row.not = e.target.value; scheduleSave(); });
    card.querySelector(".btn-sil").addEventListener("click", () => {
      mod.rows = mod.rows.filter(r => r.id !== id);
      renderModulePanel(modKey);
      renderMetrics();
      scheduleSave();
    });
    card.querySelector(".btn-hesapla").addEventListener("click", () => {
      renderModulePanel(modKey);
      renderMetrics();
    });

    const typeSel = card.querySelector(".calctype");
    if(typeSel){
      typeSel.addEventListener("change", e => {
        row.calcType = e.target.value;
        row.vals = initVals(getCalcType(cfg, row));
        renderModulePanel(modKey);
        renderMetrics();
        scheduleSave();
      });
    }

    card.querySelectorAll("[data-field]").forEach(inp => {
      const evt = inp.tagName === "SELECT" ? "change" : "input";
      inp.addEventListener(evt, e => {
        row.vals[inp.dataset.field] = e.target.value;
        scheduleSave();
      });
    });

    // oda-grup: add duvar / boşluk item
    card.querySelectorAll(".add-item").forEach(btn => {
      btn.addEventListener("click", () => {
        const g = btn.dataset.group;
        if(!row.vals[g]) row.vals[g] = [];
        row.vals[g].push({ id: uid(), mode:"boyut", genislik:"", yukseklik:"", m2:"" });
        renderModulePanel(modKey);
        renderMetrics();
        scheduleSave();
      });
    });

    // oda-grup: item mode toggle (boyut vs direkt m²)
    card.querySelectorAll(".ai-mode").forEach(sel => {
      sel.addEventListener("change", e => {
        const g = sel.dataset.group, itemId = sel.dataset.item;
        const item = (row.vals[g] || []).find(it => it.id === itemId);
        if(item){ item.mode = e.target.value; renderModulePanel(modKey); renderMetrics(); scheduleSave(); }
      });
    });

    // oda-grup: item field typing (no re-render, matches Hesapla-only behavior)
    card.querySelectorAll(".alan-item input[data-group]").forEach(inp => {
      inp.addEventListener("input", e => {
        const g = inp.dataset.group, itemId = inp.dataset.item, key = inp.dataset.key;
        const item = (row.vals[g] || []).find(it => it.id === itemId);
        if(item){ item[key] = e.target.value; scheduleSave(); }
      });
    });

    // oda-grup: delete item
    card.querySelectorAll(".ai-sil").forEach(btn => {
      btn.addEventListener("click", () => {
        const g = btn.dataset.group, itemId = btn.dataset.item;
        row.vals[g] = (row.vals[g] || []).filter(it => it.id !== itemId);
        renderModulePanel(modKey);
        renderMetrics();
        scheduleSave();
      });
    });

    // alan-toggle (single item, e.g. alçıpan düz yüzey)
    const aiModeSingle = card.querySelector(".ai-mode-single");
    if(aiModeSingle){
      aiModeSingle.addEventListener("change", e => {
        if(!row.vals.alan) row.vals.alan = {};
        row.vals.alan.mode = e.target.value;
        renderModulePanel(modKey);
        renderMetrics();
        scheduleSave();
      });
    }
    card.querySelectorAll(".ai-single").forEach(inp => {
      inp.addEventListener("input", e => {
        if(!row.vals.alan) row.vals.alan = {};
        row.vals.alan[inp.dataset.key] = e.target.value;
        scheduleSave();
      });
    });
  });
}

function renderOzetPanel(){
  const panel = document.getElementById("panel");
  let html = `<div class="module-head"><span class="swatch" style="background:var(--c-ozet)"></span><h2>Özet</h2></div>`;

  MODULE_KEYS.forEach(k => {
    const cfg = MODULE_CONFIG[k];
    const s = moduleSummary(k);
    html += `<div class="ozet-card" style="border-left-color:${cfg.color}">
      <h3><span class="swatch" style="background:${cfg.color}"></span>${cfg.label}</h3>`;
    if(s.rowCount === 0){
      html += `<p class="ozet-empty">Kayıt yok.</p>`;
    } else {
      html += `<div class="ozet-line"><span>Toplam metraj</span><span class="qty">${fmtNum(s.totalMiktar)} ${cfg.birim}</span></div>`;
      html += `<div class="ozet-line"><span>Tutar</span><span class="qty">${fmtTRY(s.totalTutar)}</span></div>`;
      html += `<div class="ozet-line"><span>Satır sayısı</span><span class="qty">${s.rowCount}</span></div>`;
      if(s.targetQ){
        html += `<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${s.progress}%;background:${cfg.color}"></div></div>
        <div class="progress-label">%${fmtNum(s.progress,0)} tamamlandı</div></div>`;
      }
    }
    html += `</div>`;
  });

  html += `<div class="placeholder-note">PDF hakediş raporu çıktısı ileride bu özetten üretilecek.</div>`;
  panel.innerHTML = html;
}

async function exportAllBackup(){
  const btn = document.getElementById("exportAllBtn");
  const original = btn.textContent;
  btn.textContent = "yedekleniyor…";
  try{
    const bundle = await fsListAll();
    const json = JSON.stringify({ exportedAt: new Date().toISOString(), data: bundle }, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `hakedis_tam_yedek_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.textContent = "indirildi ✓";
  }catch(e){
    btn.textContent = "hata, tekrar deneyin";
  }finally{
    setTimeout(() => { btn.textContent = original; }, 2500);
  }
}

async function importBackupFile(file){
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    const bundle = parsed.data || parsed;
    const keys = Object.keys(bundle).filter(k => k.startsWith("hakedis:"));
    if(!keys.length){ alert("Dosyada geri yüklenecek hakediş kaydı bulunamadı."); return; }
    if(!confirm(`${keys.length} kayıt geri yüklenecek ve varsa üzerine yazılacak. Devam edilsin mi?`)) return;
    for(const k of keys){
      let value = bundle[k];
      // eski (window.storage tabanlı) yedeklerde değer JSON string olarak durur — geriye dönük uyumluluk
      if(typeof value === "string"){
        try{ value = JSON.parse(value); }catch(e){ /* zaten obje olabilir */ }
      }
      await fsSet(k, value);
    }
    alert("Geri yükleme tamamlandı.");
    await loadCurrent();
  }catch(e){
    alert("Dosya okunamadı veya format geçersiz.");
  }
}

function renderKayitlarPanel(){
  const panel = document.getElementById("panel");
  const records = getAllRecords();
  const grandTutar = records.reduce((s,r) => s + r.tutar, 0);

  const rowsHtml = records.map(r => `<tr>
    <td>${escapeHtml(r.modul)}</td>
    <td>${escapeHtml(r.mekan) || "—"}</td>
    <td class="num">${fmtNum(r.miktar)} ${r.birim}</td>
    <td class="num">${fmtTRY(r.birimFiyat)}</td>
    <td class="num">${fmtTRY(r.tutar)}</td>
    <td>${escapeHtml(r.not)}</td>
  </tr>`).join("");

  panel.innerHTML = `
    <div class="module-head">
      <span class="swatch" style="background:var(--accent)"></span>
      <h2>Tüm Kayıtlar</h2>
    </div>
    <div class="row-summary">
      <div class="rs-item">Toplam kalem: <b>${records.length}</b></div>
      <div class="rs-item">Toplam tutar: <b>${fmtTRY(grandTutar)}</b></div>
      <button class="addrow" id="exportCsvBtn">⬇ Excel / CSV indir</button>
    </div>
    ${records.length === 0 ? '<p class="empty-note">Henüz kayıt yok.</p>' : `
    <table class="kayit-table">
      <thead><tr><th>Modül</th><th>Mekan</th><th>Miktar</th><th>Birim fiyat</th><th>Tutar</th><th>Not</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`}
    <div class="placeholder-note">Bu tablo mevcut şantiye ve dönem için tüm modüllerdeki kayıtları listeler. İndirilen CSV dosyasını Google Sheets veya Excel'e sürükleyip açabilirsiniz.</div>

    <div class="backup-box">
      <h3>Tam yedek</h3>
      <p>Tüm şantiyeler ve tüm dönemler için girdiğiniz her kaydı tek bir dosyada indirin. Bu dosyayı elinizde tutarsanız, uygulama değişse veya sıfırlansa bile verileriniz kaybolmaz — yedek dosyasından geri yükleyebilirsiniz.</p>
      <div class="backup-actions">
        <button class="addrow" id="exportAllBtn">⬇ Tam yedek indir (.json)</button>
        <button class="addrow" id="importBtn">⬆ Yedekten geri yükle</button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
      </div>
    </div>
  `;

  document.getElementById("exportCsvBtn").addEventListener("click", downloadCSV);
  document.getElementById("exportAllBtn").addEventListener("click", exportAllBackup);
  document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change", e => {
    if(e.target.files && e.target.files[0]) importBackupFile(e.target.files[0]);
    e.target.value = "";
  });
}

function renderPanel(){
  if(state.activeTab === "ozet"){
    renderOzetPanel();
  } else if(state.activeTab === "kayitlar"){
    renderKayitlarPanel();
  } else {
    renderModulePanel(state.activeTab);
  }
}

function renderAll(){
  renderMetrics();
  renderPanel();
}

function init(){
  const siteSelect = document.getElementById("siteSelect");
  SITES.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    siteSelect.appendChild(opt);
  });
  siteSelect.value = state.site;
  siteSelect.addEventListener("change", async e => {
    state.site = e.target.value;
    await loadCurrent();
  });

  const periodInput = document.getElementById("periodInput");
  periodInput.value = state.period;
  periodInput.addEventListener("change", async e => {
    state.period = e.target.value;
    await loadCurrent();
  });

  document.getElementById("hakedisNo").addEventListener("input", e => {
    state.hakedisNo = e.target.value;
    scheduleSave();
  });

  renderTabs();
  loadCurrent();
}

init();
